<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhonePe Payment Demo</title>
    <style>
        :root {
            --primary: #6739b7;
            --primary-hover: #5a2e9f;
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        h1 { margin-bottom: 1.5rem; font-weight: 700; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #666; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }
        button:hover { background-color: var(--primary-hover); }
        .status { margin-top: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <div style="background: var(--primary); color: white; margin: -2rem -2rem 2rem -2rem; padding: 2rem; border-radius: 20px 20px 0 0;">
            <h2 style="margin: 0; font-size: 1.2rem; opacity: 0.9;">Product Checkout</h2>
            <h1 style="margin: 0.5rem 0 0 0; font-size: 2.5rem;">₹8,000</h1>
        </div>
        
        <div style="text-align: left; margin-bottom: 2rem;">
            <h3 style="margin: 0; color: var(--text);">Soul Healing Consultation</h3>
            <p style="margin: 0.5rem 0; color: #666; font-size: 0.9rem; line-height: 1.4;">
                Complete your payment to schedule your session with Ayessha. Includes deep healing and personalized guidance.
            </p>
        </div>

        <div class="input-group">
            <label>Mobile Number</label>
            <input type="tel" id="mobile" placeholder="Enter mobile number" value="9999999999">
        </div>
        
        <input type="hidden" id="amount" value="8000">
        
        <button id="payBtn">Pay ₹8,000 Now</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        document.getElementById('payBtn').addEventListener('click', async () => {
            const amount = document.getElementById('amount').value;
            const mobile = document.getElementById('mobile').value;
            const status = document.getElementById('status');
            
            status.innerText = 'Initiating payment...';
            
            try {
                const response = await fetch('/pay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, mobileNumber: mobile })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    console.log('Order Initiated:', data.orderId);
                    window.location.href = data.url;
                } else {
                    status.innerText = 'Error: ' + data.message;
                }
            } catch (err) {
                status.innerText = 'Error: ' + err.message;
            }
        });
    </script>
</body>
</html>
